services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../../apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend-server:8000}
    restart: always
    mem_limit: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
