[project]
name = "ocr-core"
version = "0.1.0"
description = "OCR Web MVP — ядро OCR: модели, crop, render"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.9.0,<3",
    "httpx>=0.27.0,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "ruff>=0.6.0,<1",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 120
